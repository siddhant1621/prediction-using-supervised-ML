<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Daily Dashboard</title>\n    <style>\n        body { background-color: #121212; color: white; font-family: Arial, sans-serif; }\n        .tab { display: none; }\n        .active { display: block; }\n        .header { padding: 20px; text-align: center; }\n        .tab-content { padding: 20px; }\n        button { margin: 5px; }\n        .chart { width: 100%; height: 300px; background: #444; }\n    </style>\n</head>\n<body>\n    <div class='header'>\n        <h1>Daily Dashboard</h1>\n        <button onclick='showTab("today")'>Today</button>\n        <button onclick='showTab("plan")'>Plan</button>\n        <button onclick='showTab("weekly")'>Weekly</button>\n        <button onclick='showTab("history")'>History</button>\n    </div>\n    <div id='today' class='tab'>\n        <h2>Today's Goals</h2>\n        <p>Study Hours: <input type='number' id='studyHours' /></p>\n        <p>Expenses: <input type='number' id='expenses' /></p>\n        <p>Gym: <input type='number' id='gym' /></p>\n        <p>Productive Hours: <input type='number' id='productiveHours' /></p>\n        <p>Job Applications: <input type='number' id='jobApps' /></p>\n        <button onclick='saveToday()'>Save Today</button>\n    </div>\n    <div id='plan' class='tab'>\n        <h2>Plan</h2>\n        <textarea id='planText' placeholder='Enter your plan...'></textarea>\n        <button onclick='savePlan()'>Save Plan</button>\n    </div>\n    <div id='weekly' class='tab'>\n        <h2>Weekly Analytics</h2>\n        <div class='chart' id='weeklyChart'></div>\n    </div>\n    <div id='history' class='tab'>\n        <h2>History</h2>\n        <div id='historyData'></div>\n    </div>\n    <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>\n    <script>\n        function showTab(tab) {\n            const tabs = document.querySelectorAll('.tab');\n            tabs.forEach(t => t.classList.remove('active'));\n            document.getElementById(tab).classList.add('active');\n        }\n        function saveToday() {\n            const data = {\n                studyHours: document.getElementById('studyHours').value,\n                expenses: document.getElementById('expenses').value,\n                gym: document.getElementById('gym').value,\n                productiveHours: document.getElementById('productiveHours').value,\n                jobApps: document.getElementById('jobApps').value\n            };\n            localStorage.setItem('todayData', JSON.stringify(data));\n            alert('Saved!');\n        }\n        function savePlan() {\n            const plan = document.getElementById('planText').value;\n            localStorage.setItem('plan', plan);\n            alert('Plan Saved!');\n        }\n        function loadWeekStats() {\n            const history = JSON.parse(localStorage.getItem('historyData')) || [];\n            const ctx = document.getElementById('weeklyChart').getContext('2d');\n            const labels = history.map(h => h.date);\n            const data = {\n                labels: labels,\n                datasets: [{\n                    label: 'Study Hours',\n                    data: history.map(h => h.studyHours),\n                    backgroundColor: 'rgba(75, 192, 192, 0.2)',\n                    borderColor: 'rgba(75, 192, 192, 1)',\n                    borderWidth: 1\n                }]\n            };\n            new Chart(ctx, {\n                type: 'bar',\n                data: data\n            });\n        }\n        showTab('today');\n        loadWeekStats();\n    </script>\n</body>\n</html>
