<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.1.9/Recharts.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .dashboard { display: flex; flex-direction: column; align-items: center; }
        .chart { margin: 20px; }
    </style>
</head>
<body>
    <div id="root" class="dashboard"></div>
    <script>
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, Legend, CartesianGrid } = Recharts;

        const App = () => {
            const [data, setData] = useState([]);
            
            useEffect(() => {
                // Simulation of data fetching
                const fetchData = () => {
                    const sampleData = [
                        { name: 'Group A', value: 4000 },
                        { name: 'Group B', value: 3000 },
                        { name: 'Group C', value: 2000 },
                        { name: 'Group D', value: 2780 },
                        { name: 'Group E', value: 1890 },
                    ];
                    setData(sampleData);
                };
                fetchData();
            }, []);

            return (
                <BarChart
                    width={600}
                    height={300}
                    data={data}
                    margin={{ top: 5, right: 30, left: 20, bottom: 5 }}
                >
                    <CartesianGrid strokeDasharray="3 3" />
                    <XAxis dataKey="name" />
                    <YAxis />
                    <Tooltip />
                    <Legend />
                    <Bar dataKey="value" fill="#8884d8" />
                </BarChart>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
