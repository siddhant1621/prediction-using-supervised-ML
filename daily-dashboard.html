<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RWU Daily Dashboard — Siddhanth</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            electric: '#60a5fa',
            emerald: '#34d399',
            amber: '#fbbf24'
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .glass { backdrop-filter: blur(10px); background: rgba(17, 24, 39, 0.8); }
    .glow { box-shadow: 0 0 20px rgba(96, 165, 250, 0.3); }
  </style>
</head>
<body class="dark bg-gray-950 text-gray-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line, RadialBarChart, RadialBar } = Recharts;

    // Data Management
    const STORAGE_KEY = 'rwu_dashboard';
    
    const defaultData = {
      settings: {
        dailyBudget: 20,
        productiveTarget: 6,
        subjectGoals: {
          'Advanced Control Systems': 5,
          'Communication 2 / Wireless': 5,
          'Computer Architecture': 5,
          'German A1': 3,
          'Digital Filters and Algorithms': 5,
          'Lidar and Radar Systems': 5,
          'NFC / Communication': 4,
          'Applied Mathematics': 4,
          'Numerical Methods': 4
        }
      },
      days: {},
      plannedGoals: []
    };

    const subjects = {
      'Semester 2': [
        'Advanced Control Systems',
        'Communication 2 / Wireless',
        'Computer Architecture',
        'German A1',
        'Digital Filters and Algorithms',
        'Lidar and Radar Systems'
      ],
      'Repeat Exam Prep': [
        'NFC / Communication',
        'Applied Mathematics',
        'Numerical Methods'
      ]
    };

    const expenseCategories = ['Food', 'Transport', 'Groceries', 'Study Material', 'Subscriptions', 'Misc'];

    const useData = () => {
      const [data, setData] = useState(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          return stored ? { ...defaultData, ...JSON.parse(stored) } : defaultData;
        } catch {
          return defaultData;
        }
      });

      const updateData = useCallback((updates) => {
        setData(prev => {
          const newData = typeof updates === 'function' ? updates(prev) : { ...prev, ...updates };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(newData));
          return newData;
        });
      }, []);

      return [data, updateData];
    };

    // Utility Functions
    const getToday = () => new Date().toISOString().split('T')[0];
    
    const getGreeting = () => {
      const hour = new Date().getHours();
      if (hour < 12) return 'Good morning';
      if (hour < 18) return 'Good afternoon';
      return 'Good evening';
    };

    const getDayData = (data, date) => {
      return data.days[date] || {
        goals: [],
        studyHours: {},
        expenses: [],
        gym: { done: false, type: '', duration: 0 },
        productive: { total: 0, study: 0, jobHunt: 0, project: 0 },
        jobs: { count: 0, companies: '' },
        notes: ''
      };
    };

    const calculateStreak = (data, subject) => {
      const today = new Date();
      let streak = 0;
      
      for (let i = 0; i < 30; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        const dayData = data.days[dateStr];
        
        if (dayData && dayData.studyHours[subject] > 0) {
          streak++;
        } else if (i === 0) {
          break;
        } else {
          break;
        }
      }
      
      return streak;
    };

    const getWeekData = (data, weeksBack = 0) => {
      const result = [];
      const today = new Date();
      
      for (let i = 6; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i - (weeksBack * 7));
        const dateStr = date.toISOString().split('T')[0];
        const dayData = getDayData(data, dateStr);
        
        result.push({
          date: dateStr,
          day: date.toLocaleDateString('en', { weekday: 'short' }),
          ...dayData
        });
      }
      
      return result;
    };

    // Components
    const CircularProgress = ({ percentage, size = 120, strokeWidth = 8 }) => {
      const radius = (size - strokeWidth) / 2;
      const circumference = radius * 2 * Math.PI;
      const strokeDasharray = `${circumference} ${circumference}`;
      const strokeDashoffset = circumference - (percentage / 100) * circumference;

      return (
        <div className="relative inline-flex items-center justify-center">
          <svg
            className="transform -rotate-90"
            width={size}
            height={size}
          >
            <circle
              cx={size / 2}
              cy={size / 2}
              r={radius}
              stroke="currentColor"
              strokeWidth={strokeWidth}
              fill="transparent"
              className="text-gray-700"
            />
            <circle
              cx={size / 2}
              cy={size / 2}
              r={radius}
              stroke="currentColor"
              strokeWidth={strokeWidth}
              fill="transparent"
              strokeDasharray={strokeDasharray}
              strokeDashoffset={strokeDashoffset}
              className="text-electric transition-all duration-500 ease-in-out"
              strokeLinecap="round"
            />
          </svg>
          <span className="absolute inset-0 flex items-center justify-center text-2xl font-bold text-electric">
            {Math.round(percentage)}%
          </span>
        </div>
      );
    };

    const Card = ({ children, className = '', ...props }) => (
      <div className={`bg-gray-900 rounded-xl p-6 shadow-lg border border-gray-800 ${className}`} {...props}>
        {children}
      </div>
    );

    const Button = ({ children, variant = 'primary', size = 'md', className = '', ...props }) => {
      const variants = {
        primary: 'bg-electric hover:bg-blue-500 text-gray-900',
        secondary: 'bg-gray-800 hover:bg-gray-700 text-gray-100',
        danger: 'bg-red-600 hover:bg-red-500 text-white'
      };
      
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2',
        lg: 'px-6 py-3 text-lg'
      };

      return (
        <button
          className={`font-medium rounded-lg transition-colors ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    };

    const Input = ({ className = '', ...props }) => (
      <input
        className={`bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:outline-none focus:ring-2 focus:ring-electric focus:border-transparent ${className}`}
        {...props}
      />
    );

    const Textarea = ({ className = '', ...props }) => (
      <textarea
        className={`bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:outline-none focus:ring-2 focus:ring-electric focus:border-transparent resize-none ${className}`}
        {...props}
      />
    );

    const Select = ({ children, className = '', ...props }) => (
      <select
        className={`bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:outline-none focus:ring-2 focus:ring-electric focus:border-transparent ${className}`}
        {...props}
      >
        {children}
      </select>
    );

    // Today Tab
    const TodayTab = ({ data, updateData }) => {
      const today = getToday();
      const todayData = getDayData(data, today);
      
      // Sync planned goals to today's goals if today has no goals (run once on mount)
      // eslint-disable-next-line react-hooks/exhaustive-deps
      useEffect(() => {
        if (todayData.goals.length === 0 && data.plannedGoals.length > 0) {
          updateData(prev => ({
            ...prev,
            days: {
              ...prev.days,
              [today]: {
                ...getDayData(prev, today),
                goals: prev.plannedGoals.map(goal => ({ ...goal, done: false }))
              }
            },
            plannedGoals: []
          }));
        }
      }, []); // intentionally empty - run once on mount to sync planned goals

      const dayScore = todayData.goals.length > 0 
        ? (todayData.goals.filter(g => g.done).length / todayData.goals.length) * 100 
        : 0;

      const totalExpenses = todayData.expenses.reduce((sum, exp) => sum + exp.amount, 0);

      const updateTodayData = (field, value) => {
        updateData(prev => ({
          ...prev,
          days: {
            ...prev.days,
            [today]: { ...getDayData(prev, today), [field]: value }
          }
        }));
      };

      const toggleGoal = (goalId) => {
        const updatedGoals = todayData.goals.map(goal =>
          goal.id === goalId ? { ...goal, done: !goal.done } : goal
        );
        updateTodayData('goals', updatedGoals);
      };

      const updateStudyHours = (subject, hours) => {
        const numHours = parseFloat(hours) || 0;
        updateTodayData('studyHours', { ...todayData.studyHours, [subject]: numHours });
      };

      const addExpense = (amount, category, note) => {
        const expense = {
          id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
          amount: parseFloat(amount),
          category,
          note,
          time: new Date().toLocaleTimeString()
        };
        updateTodayData('expenses', [...todayData.expenses, expense]);
      };

      const removeExpense = (expenseId) => {
        updateTodayData('expenses', todayData.expenses.filter(exp => exp.id !== expenseId));
      };

      const updateGym = (field, value) => {
        updateTodayData('gym', { ...todayData.gym, [field]: value });
      };

      const updateProductive = (field, value) => {
        const numValue = parseFloat(value) || 0;
        const newProductive = { ...todayData.productive, [field]: numValue };
        if (field !== 'total') {
          newProductive.total = newProductive.study + newProductive.jobHunt + newProductive.project;
        }
        updateTodayData('productive', newProductive);
      };

      const updateJobs = (field, value) => {
        const jobData = { ...todayData.jobs };
        if (field === 'count') {
          jobData.count = parseInt(value) || 0;
        } else {
          jobData[field] = value;
        }
        updateTodayData('jobs', jobData);
      };

      return (
        <div className="space-y-6 fade-in">
          {/* Header */}
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-3xl font-bold">
                {getGreeting()}, Siddhanth
              </h1>
              <p className="text-gray-400 mt-1">
                You have {todayData.goals.length} goals today
              </p>
            </div>
            <div className="text-center">
              <CircularProgress percentage={dayScore} />
              <p className="text-sm text-gray-400 mt-2">Day Score</p>
            </div>
          </div>

          {/* Goals Section */}
          <Card>
            <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
              🎯 Today's Goals
            </h2>
            {todayData.goals.length === 0 ? (
              <p className="text-gray-400">No goals set for today. Add some in the Plan tab!</p>
            ) : (
              <div className="space-y-3">
                {todayData.goals.map(goal => (
                  <div
                    key={goal.id}
                    className={`flex items-center gap-3 p-3 rounded-lg border transition-all cursor-pointer ${
                      goal.done
                        ? 'bg-emerald-900/20 border-emerald-500/50 text-emerald-100'
                        : 'bg-gray-800 border-gray-700 hover:bg-gray-750'
                    }`}
                    onClick={() => toggleGoal(goal.id)}
                  >
                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${
                      goal.done ? 'bg-emerald-500 border-emerald-500' : 'border-gray-500'
                    }`}>
                      {goal.done && <span className="text-white text-xs">✓</span>}
                    </div>
                    <span className={goal.done ? 'line-through' : ''}>{goal.text}</span>
                  </div>
                ))}
              </div>
            )}
          </Card>

          {/* Study Hours */}
          <Card>
            <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
              📚 Study Hours
            </h2>
            <div className="space-y-6">
              {Object.entries(subjects).map(([category, subjectList]) => (
                <div key={category}>
                  <h3 className="text-lg font-medium text-electric mb-3">{category}</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {subjectList.map(subject => {
                      const hours = todayData.studyHours[subject] || 0;
                      const streak = calculateStreak(data, subject);
                      const weeklyGoal = data.settings.subjectGoals[subject] || 5;
                      
                      // Calculate weekly progress
                      const weekData = getWeekData(data);
                      const weeklyHours = weekData.reduce((sum, day) => sum + (day.studyHours[subject] || 0), 0);
                      const weeklyProgress = (weeklyHours / weeklyGoal) * 100;

                      return (
                        <div key={subject} className="bg-gray-800 rounded-lg p-4">
                          <div className="flex items-center justify-between mb-2">
                            <h4 className="font-medium text-sm">{subject}</h4>
                            {streak > 0 && (
                              <span className="text-xs bg-orange-500 text-white px-2 py-1 rounded-full flex items-center gap-1">
                                🔥 {streak}
                              </span>
                            )}
                          </div>
                          
                          <div className="mb-3">
                            <div className="flex justify-between text-xs text-gray-400 mb-1">
                              <span>Weekly: {weeklyHours.toFixed(1)}h / {weeklyGoal}h</span>
                              <span>{Math.round(weeklyProgress)}%</span>
                            </div>
                            <div className="w-full bg-gray-700 rounded-full h-2">
                              <div
                                className="bg-emerald-500 h-2 rounded-full transition-all"
                                style={{ width: `${Math.min(weeklyProgress, 100)}%` }}
                              />
                            </div>
                          </div>

                          <div className="flex items-center gap-2">
                            <Input
                              type="number"
                              step="0.1"
                              min="0"
                              max="24"
                              value={hours}
                              onChange={(e) => updateStudyHours(subject, e.target.value)}
                              className="flex-1 text-center"
                              placeholder="0"
                            />
                            <span className="text-sm text-gray-400">hours today</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </Card>

          {/* Expenses */}
          <Card>
            <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
              💰 Expenses
            </h2>
            
            <div className="mb-6 p-4 bg-gray-800 rounded-lg">
              <ExpenseForm onAdd={addExpense} />
            </div>

            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-4">
                <div className="text-2xl font-bold">
                  €{totalExpenses.toFixed(2)}
                </div>
                <div className={`text-sm px-3 py-1 rounded-full ${
                  totalExpenses <= data.settings.dailyBudget
                    ? 'bg-emerald-900 text-emerald-200'
                    : 'bg-red-900 text-red-200'
                }`}>
                  Budget: €{data.settings.dailyBudget}
                </div>
              </div>
              
              {todayData.expenses.length > 0 && (
                <div className="w-24 h-24">
                  <ResponsiveContainer>
                    <PieChart>
                      <Pie
                        data={expenseCategories.map(cat => ({
                          name: cat,
                          value: todayData.expenses
                            .filter(exp => exp.category === cat)
                            .reduce((sum, exp) => sum + exp.amount, 0)
                        })).filter(item => item.value > 0)}
                        dataKey="value"
                        cx="50%"
                        cy="50%"
                        innerRadius={20}
                        outerRadius={40}
                      >
                        {expenseCategories.map((cat, index) => (
                          <Cell key={cat} fill={`hsl(${index * 60}, 70%, 50%)`} />
                        ))}
                      </Pie>
                      <Tooltip />
                    </PieChart>
                  </ResponsiveContainer>
                </div>
              )}
            </div>

            <div className="space-y-2 max-h-60 overflow-y-auto">
              {todayData.expenses.map(expense => (
                <div key={expense.id} className="flex items-center justify-between p-3 bg-gray-800 rounded-lg">
                  <div>
                    <div className="flex items-center gap-2">
                      <span className="font-medium">€{expense.amount.toFixed(2)}</span>
                      <span className="text-xs bg-gray-700 px-2 py-1 rounded">{expense.category}</span>
                      <span className="text-xs text-gray-400">{expense.time}</span>
                    </div>
                    {expense.note && <p className="text-sm text-gray-400 mt-1">{expense.note}</p>}
                  </div>
                  <Button
                    variant="danger"
                    size="sm"
                    onClick={() => removeExpense(expense.id)}
                  >
                    ✕
                  </Button>
                </div>
              ))}
            </div>
          </Card>

          {/* Gym & Productive Hours */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card>
              <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
                💪 Gym
              </h2>
              <div className="space-y-4">
                <div className="flex items-center gap-2">
                  <input
                    type="checkbox"
                    checked={todayData.gym.done}
                    onChange={(e) => updateGym('done', e.target.checked)}
                    className="w-5 h-5 text-electric bg-gray-800 border-gray-600 rounded focus:ring-electric"
                  />
                  <label className="text-lg">Went to gym today</label>
                </div>
                
                {todayData.gym.done && (
                  <div className="space-y-3 pl-7">
                    <Input
                      type="text"
                      placeholder="Workout type (e.g., Push, Pull, Legs)"
                      value={todayData.gym.type}
                      onChange={(e) => updateGym('type', e.target.value)}
                      className="w-full"
                    />
                    <div className="flex items-center gap-2">
                      <Input
                        type="number"
                        min="0"
                        max="300"
                        value={todayData.gym.duration}
                        onChange={(e) => updateGym('duration', parseInt(e.target.value) || 0)}
                        className="w-20 text-center"
                      />
                      <span className="text-gray-400">minutes</span>
                    </div>
                  </div>
                )}
              </div>
            </Card>

            <Card>
              <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
                ⚡ Productive Hours
              </h2>
              <div className="space-y-3">
                <div className="flex items-center justify-between p-3 bg-gray-800 rounded-lg">
                  <span className="font-medium">Total</span>
                  <div className="flex items-center gap-2">
                    <span className="text-2xl font-bold text-electric">
                      {todayData.productive.total.toFixed(1)}
                    </span>
                    <span className="text-gray-400">/ {data.settings.productiveTarget}h</span>
                  </div>
                </div>
                
                <div className="space-y-2">
                  {[
                    { key: 'study', label: 'Study', icon: '📚' },
                    { key: 'jobHunt', label: 'Job Hunt', icon: '💼' },
                    { key: 'project', label: 'Projects', icon: '🚀' }
                  ].map(({ key, label, icon }) => (
                    <div key={key} className="flex items-center justify-between">
                      <span className="flex items-center gap-2">
                        <span>{icon}</span>
                        {label}
                      </span>
                      <div className="flex items-center gap-2">
                        <Input
                          type="number"
                          step="0.1"
                          min="0"
                          max="24"
                          value={todayData.productive[key]}
                          onChange={(e) => updateProductive(key, e.target.value)}
                          className="w-20 text-center"
                        />
                        <span className="text-gray-400 w-8">h</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </Card>
          </div>

          {/* Job Applications */}
          <Card>
            <h2 className="text-xl font-semibold mb-4 flex items-center gap-2">
              💼 Job Applications
            </h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label className="block text-sm font-medium mb-2">Applications sent today</label>
                <Input
                  type="number"
                  min="0"
                  value={todayData.jobs.count}
                  onChange={(e) => updateJobs('count', e.target.value)}
                  className="w-full text-center text-lg"
                />
              </div>
              <div>
                <label className="block text-sm font-medium mb-2">Companies</label>
                <Textarea
                  value={todayData.jobs.companies}
                  onChange={(e) => updateJobs('companies', e.target.value)}
                  placeholder="Company names..."
                  rows={3}
                  className="w-full"
                />
              </div>
            </div>
          </Card>
        </div>
      );
    };

    const ExpenseForm = ({ onAdd }) => {
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState('Food');
      const [note, setNote] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!amount || isNaN(parseFloat(amount)) || parseFloat(amount) <= 0) return;
        
        onAdd(amount, category, note);
        setAmount('');
        setNote('');
      };

      return (
        <form onSubmit={handleSubmit} className="flex flex-wrap gap-3">
          <Input
            type="number"
            step="0.01"
            min="0"
            placeholder="Amount"
            value={amount}
            onChange={(e) => setAmount(e.target.value)}
            className="w-24"
            required
          />
          <Select
            value={category}
            onChange={(e) => setCategory(e.target.value)}
            className="w-36"
          >
            {expenseCategories.map(cat => (
              <option key={cat} value={cat}>{cat}</option>
            ))}
          </Select>
          <Input
            type="text"
            placeholder="Note (optional)"
            value={note}
            onChange={(e) => setNote(e.target.value)}
            className="flex-1 min-w-32"
          />
          <Button type="submit">Add</Button>
        </form>
      );
    };

    // Plan Tab
    const PlanTab = ({ data, updateData }) => {
      const [newGoal, setNewGoal] = useState('');
      const [goalType, setGoalType] = useState('custom');

      const presetGoals = [
        'Complete assignment for Advanced Control Systems',
        'Study German vocabulary for 1 hour',
        'Review Communication 2 notes',
        'Work on final project',
        'Apply to 3 companies',
        'Go to gym',
        'Prepare for upcoming exams'
      ];

      const addGoal = (goalText) => {
        const goal = {
          id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
          text: goalText
        };
        
        updateData(prev => ({
          ...prev,
          plannedGoals: [...prev.plannedGoals, goal]
        }));
      };

      const removeGoal = (goalId) => {
        updateData(prev => ({
          ...prev,
          plannedGoals: prev.plannedGoals.filter(goal => goal.id !== goalId)
        }));
      };

      const clearAll = () => {
        updateData(prev => ({
          ...prev,
          plannedGoals: []
        }));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!newGoal.trim()) return;
        
        addGoal(newGoal);
        setNewGoal('');
        setGoalType('custom');
      };

      const handlePresetSelect = (preset) => {
        setGoalType('preset');
        addGoal(preset);
      };

      return (
        <div className="space-y-6 fade-in">
          <div className="flex items-center justify-between">
            <h1 className="text-3xl font-bold">Plan Tomorrow</h1>
            <div className="text-gray-400">
              {data.plannedGoals.length} goals planned
            </div>
          </div>

          {/* Add Goal Form */}
          <Card>
            <h2 className="text-xl font-semibold mb-4">Add New Goal</h2>
            
            <form onSubmit={handleSubmit} className="mb-6">
              <div className="flex gap-3">
                <Input
                  type="text"
                  placeholder="Enter your goal..."
                  value={newGoal}
                  onChange={(e) => setNewGoal(e.target.value)}
                  className="flex-1"
                />
                <Button type="submit">Add Goal</Button>
              </div>
            </form>

            <div>
              <h3 className="text-lg font-medium mb-3">Quick Add Presets</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                {presetGoals.map((preset, index) => (
                  <button
                    key={index}
                    onClick={() => handlePresetSelect(preset)}
                    className="text-left p-3 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors"
                  >
                    {preset}
                  </button>
                ))}
              </div>
            </div>
          </Card>

          {/* Planned Goals */}
          <Card>
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-xl font-semibold">Tomorrow's Goals</h2>
              {data.plannedGoals.length > 0 && (
                <Button variant="danger" size="sm" onClick={clearAll}>
                  Clear All
                </Button>
              )}
            </div>

            {data.plannedGoals.length === 0 ? (
              <div className="text-center py-12 text-gray-400">
                <div className="text-4xl mb-4">🎯</div>
                <p>No goals planned yet</p>
                <p className="text-sm">Add some goals above to get started!</p>
              </div>
            ) : (
              <div className="space-y-3">
                {data.plannedGoals.map((goal, index) => (
                  <div
                    key={goal.id}
                    className="flex items-center justify-between p-4 bg-gray-800 rounded-lg hover:bg-gray-750 transition-colors"
                  >
                    <div className="flex items-center gap-3">
                      <span className="w-8 h-8 bg-electric text-gray-900 rounded-full flex items-center justify-center font-bold">
                        {index + 1}
                      </span>
                      <span>{goal.text}</span>
                    </div>
                    <Button
                      variant="danger"
                      size="sm"
                      onClick={() => removeGoal(goal.id)}
                    >
                      ✕
                    </Button>
                  </div>
                ))}
              </div>
            )}
          </Card>

          {/* Tips */}
          <Card className="bg-blue-900/20 border-blue-500/30">
            <h3 className="text-lg font-medium mb-2 text-blue-300">💡 Planning Tips</h3>
            <ul className="text-blue-100 text-sm space-y-1">
              <li>• Keep goals specific and actionable</li>
              <li>• Aim for 3-7 goals per day for optimal focus</li>
              <li>• Mix different types: study, personal, professional</li>
              <li>• These goals will automatically appear in tomorrow's Today tab</li>
            </ul>
          </Card>
        </div>
      );
    };

    // Weekly Tab
    const WeeklyTab = ({ data, updateData }) => {
      const weekData = getWeekData(data);
      
      // Study hours chart data
      const studyChartData = weekData.map(day => {
        const dayData = { day: day.day, date: day.date };
        Object.keys(subjects).forEach(category => {
          subjects[category].forEach(subject => {
            dayData[subject] = day.studyHours[subject] || 0;
          });
        });
        return dayData;
      });

      // Expense chart data
      const expenseChartData = weekData.map(day => ({
        day: day.day,
        spent: day.expenses.reduce((sum, exp) => sum + exp.amount, 0),
        budget: data.settings.dailyBudget
      }));

      // Productive hours data
      const productiveChartData = weekData.map(day => ({
        day: day.day,
        total: day.productive.total,
        study: day.productive.study,
        jobHunt: day.productive.jobHunt,
        project: day.productive.project,
        target: data.settings.productiveTarget
      }));

      // Job applications data
      const jobsChartData = weekData.map(day => ({
        day: day.day,
        applications: day.jobs.count
      }));

      // Day scores data
      const scoresData = weekData.map(day => {
        const score = day.goals.length > 0 
          ? (day.goals.filter(g => g.done).length / day.goals.length) * 100 
          : 0;
        return { day: day.day, score };
      });

      // Colors for charts
      const colors = ['#60a5fa', '#34d399', '#fbbf24', '#f87171', '#a78bfa', '#fb7185', '#14b8a6', '#f59e0b', '#8b5cf6'];

      // CSV Export
      const exportCSV = () => {
        const headers = ['Date', 'Goals Done', 'Goals Total', 'Total Study Hours', 'Total Expenses', 'Gym', 'Productive Hours', 'Jobs Sent'];
        const rows = weekData.map(day => {
          const goalsDone = day.goals.filter(g => g.done).length;
          const goalsTotal = day.goals.length;
          const totalStudyHours = Object.values(day.studyHours).reduce((sum, h) => sum + h, 0);
          const totalExpenses = day.expenses.reduce((sum, exp) => sum + exp.amount, 0);
          const gym = day.gym.done ? 'Yes' : 'No';
          const productiveHours = day.productive.total;
          const jobsSent = day.jobs.count;
          
          return [day.date, goalsDone, goalsTotal, totalStudyHours.toFixed(1), totalExpenses.toFixed(2), gym, productiveHours.toFixed(1), jobsSent];
        });

        const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `dashboard-week-${getToday()}.csv`;
        link.click();
        URL.revokeObjectURL(url);
      };

      // Generate gym heatmap for current month
      const generateGymHeatmap = () => {
        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();
        
        const days = [];
        
        // Empty cells for days before month starts
        for (let i = 0; i < firstDay; i++) {
          days.push(null);
        }
        
        // Actual days of month
        for (let day = 1; day <= daysInMonth; day++) {
          const date = new Date(year, month, day);
          const dateStr = date.toISOString().split('T')[0];
          const dayData = data.days[dateStr];
          const gymDone = dayData ? dayData.gym.done : false;
          const isFuture = dateStr > getToday();
          
          days.push({
            day,
            date: dateStr,
            gymDone,
            isFuture
          });
        }
        
        return days;
      };

      const gymHeatmapData = generateGymHeatmap();

      return (
        <div className="space-y-6 fade-in">
          <div className="flex items-center justify-between">
            <h1 className="text-3xl font-bold">Weekly Overview</h1>
            <Button onClick={exportCSV} className="flex items-center gap-2">
              📊 Export CSV
            </Button>
          </div>

          {/* Study Hours Chart */}
          <Card>
            <h2 className="text-xl font-semibold mb-4">📚 Study Hours by Subject</h2>
            <div className="h-80">
              <ResponsiveContainer>
                <BarChart data={studyChartData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis dataKey="day" stroke="#9ca3af" />
                  <YAxis stroke="#9ca3af" />
                  <Tooltip 
                    contentStyle={{ backgroundColor: '#1f2937', border: '1px solid #374151', borderRadius: '8px' }}
                    labelStyle={{ color: '#f3f4f6' }}
                  />
                  <Legend />
                  {Object.keys(subjects).map((category, categoryIndex) => 
                    subjects[category].map((subject, subjectIndex) => (
                      <Bar 
                        key={subject} 
                        dataKey={subject} 
                        fill={colors[(categoryIndex * 3 + subjectIndex) % colors.length]}
                        stackId={1}
                      />
                    ))
                  )}
                </BarChart>
              </ResponsiveContainer>
            </div>
            
            {/* Weekly totals */}
            <div className="mt-4 grid grid-cols-2 md:grid-cols-3 gap-4">
              {Object.keys(subjects).map(category =>
                subjects[category].map(subject => {
                  const weeklyHours = weekData.reduce((sum, day) => sum + (day.studyHours[subject] || 0), 0);
                  return (
                    <div key={subject} className="bg-gray-800 rounded-lg p-3">
                      <div className="text-sm text-gray-400">{subject}</div>
                      <div className="text-lg font-bold">{weeklyHours.toFixed(1)}h</div>
                    </div>
                  );
                })
              )}
            </div>
          </Card>

          {/* Expenses Chart */}
          <Card>
            <h2 className="text-xl font-semibold mb-4">💰 Daily Expenses vs Budget</h2>
            <div className="h-64">
              <ResponsiveContainer>
                <BarChart data={expenseChartData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                  <XAxis dataKey="day" stroke="#9ca3af" />
                  <YAxis stroke="#9ca3af" />
                  <Tooltip 
                    contentStyle={{ backgroundColor: '#1f2937', border: '1px solid #374151', borderRadius: '8px' }}
                    labelStyle={{ color: '#f3f4f6' }}
                    formatter={(value, name) => [`€${value.toFixed(2)}`, name === 'spent' ? 'Spent' : 'Budget']}
                  />
                  <Legend />
                  <Bar dataKey="spent" fill="#60a5fa" />
                  <Bar dataKey="budget" fill="#6b7280" fillOpacity={0.3} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </Card>

          {/* Productive Hours & Job Apps */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card>
              <h2 className="text-xl font-semibold mb-4">⚡ Productive Hours</h2>
              <div className="h-64">
                <ResponsiveContainer>
                  <BarChart data={productiveChartData}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                    <XAxis dataKey="day" stroke="#9ca3af" />
                    <YAxis stroke="#9ca3af" />
                    <Tooltip 
                      contentStyle={{ backgroundColor: '#1f2937', border: '1px solid #374151', borderRadius: '8px' }}
                      labelStyle={{ color: '#f3f4f6' }}
                    />
                    <Legend />
                    <Bar dataKey="study" stackId={1} fill="#34d399" />
                    <Bar dataKey="jobHunt" stackId={1} fill="#60a5fa" />
                    <Bar dataKey="project" stackId={1} fill="#fbbf24" />
                    <Bar dataKey="target" fill="#6b7280" fillOpacity={0.3} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </Card>

            <Card>
              <h2 className="text-xl font-semibold mb-4">💼 Job Applications</h2>
              <div className="h-64">
                <ResponsiveContainer>
                  <BarChart data={jobsChartData}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                    <XAxis dataKey="day" stroke="#9ca3af" />
                    <YAxis stroke="#9ca3af" />
                    <Tooltip 
                      contentStyle={{ backgroundColor: '#1f2937', border: '1px solid #374151', borderRadius: '8px' }}
                      labelStyle={{ color: '#f3f4f6' }}
                    />
                    <Bar dataKey="applications" fill="#a78bfa" />
                  </BarChart>
                </ResponsiveContainer>
              </div>
              <div className="mt-4 text-center">
                <div className="text-2xl font-bold text-electric">
                  {weekData.reduce((sum, day) => sum + day.jobs.count, 0)}
                </div>
                <div className="text-gray-400">Total applications this week</div>
              </div>
            </Card>
          </div>

          {/* Gym Heatmap & Day Scores */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card>
              <h2 className="text-xl font-semibold mb-4">💪 Gym This Month</h2>
              <div className="grid grid-cols-7 gap-2 mb-4">
                {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                  <div key={day} className="text-center text-xs text-gray-400 py-1">
                    {day}
                  </div>
                ))}
              </div>
              <div className="grid grid-cols-7 gap-2">
                {gymHeatmapData.map((day, index) => (
                  <div
                    key={index}
                    className={`aspect-square rounded text-xs flex items-center justify-center ${
                      day === null 
                        ? '' 
                        : day.isFuture
                        ? 'bg-gray-800 text-gray-500'
                        : day.gymDone
                        ? 'bg-emerald-500 text-white font-bold'
                        : 'bg-gray-700 text-gray-300'
                    }`}
                    title={day ? `${day.date}: ${day.gymDone ? 'Gym ✓' : 'No gym'}` : ''}
                  >
                    {day?.day}
                  </div>
                ))}
              </div>
              <div className="mt-4 flex items-center justify-center gap-4 text-sm">
                <div className="flex items-center gap-2">
                  <div className="w-3 h-3 bg-gray-700 rounded"></div>
                  <span className="text-gray-400">Skipped</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="w-3 h-3 bg-emerald-500 rounded"></div>
                  <span className="text-gray-400">Went</span>
                </div>
              </div>
            </Card>

            <Card>
              <h2 className="text-xl font-semibold mb-4">🎯 Daily Scores</h2>
              <div className="h-64">
                <ResponsiveContainer>
                  <LineChart data={scoresData}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#374151" />
                    <XAxis dataKey="day" stroke="#9ca3af" />
                    <YAxis stroke="#9ca3af" domain={[0, 100]} />
                    <Tooltip 
                      contentStyle={{ backgroundColor: '#1f2937', border: '1px solid #374151', borderRadius: '8px' }}
                      labelStyle={{ color: '#f3f4f6' }}
                      formatter={(value) => [`${value.toFixed(0)}%`, 'Score']}
                    />
                    <Line 
                      type="monotone" 
                      dataKey="score" 
                      stroke="#60a5fa" 
                      strokeWidth={3}
                      dot={{ fill: '#60a5fa', strokeWidth: 2, r: 6 }}
                    />
                  </LineChart>
                </ResponsiveContainer>
              </div>
              <div className="mt-4 text-center">
                <div className="text-2xl font-bold text-electric">
                  {(scoresData.reduce((sum, day) => sum + day.score, 0) / 7).toFixed(0)}%
                </div>
                <div className="text-gray-400">Average weekly score</div>
              </div>
            </Card>
          </div>
        </div>
      );
    };

    // History Tab
    const HistoryTab = ({ data }) => {
      const [selectedDate, setSelectedDate] = useState(getToday());
      const dayData = getDayData(data, selectedDate);
      
      const dayScore = dayData.goals.length > 0 
        ? (dayData.goals.filter(g => g.done).length / dayData.goals.length) * 100 
        : 0;

      const totalExpenses = dayData.expenses.reduce((sum, exp) => sum + exp.amount, 0);
      const totalStudyHours = Object.values(dayData.studyHours).reduce((sum, hours) => sum + hours, 0);

      return (
        <div className="space-y-6 fade-in">
          <div className="flex items-center justify-between">
            <h1 className="text-3xl font-bold">History</h1>
            <Input
              type="date"
              value={selectedDate}
              onChange={(e) => setSelectedDate(e.target.value)}
              className="w-auto"
            />
          </div>

          {/* Day Overview */}
          <Card>
            <div className="flex items-center justify-between mb-6">
              <div>
                <h2 className="text-2xl font-bold">{new Date(selectedDate).toLocaleDateString('en', { 
                  weekday: 'long', 
                  year: 'numeric', 
                  month: 'long', 
                  day: 'numeric' 
                })}</h2>
                <p className="text-gray-400">Daily summary</p>
              </div>
              <CircularProgress percentage={dayScore} size={100} />
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div className="text-center p-4 bg-gray-800 rounded-lg">
                <div className="text-2xl font-bold text-electric">{dayData.goals.filter(g => g.done).length}/{dayData.goals.length}</div>
                <div className="text-sm text-gray-400">Goals Completed</div>
              </div>
              <div className="text-center p-4 bg-gray-800 rounded-lg">
                <div className="text-2xl font-bold text-emerald-400">{totalStudyHours.toFixed(1)}h</div>
                <div className="text-sm text-gray-400">Study Hours</div>
              </div>
              <div className="text-center p-4 bg-gray-800 rounded-lg">
                <div className="text-2xl font-bold text-amber-400">€{totalExpenses.toFixed(2)}</div>
                <div className="text-sm text-gray-400">Expenses</div>
              </div>
              <div className="text-center p-4 bg-gray-800 rounded-lg">
                <div className="text-2xl font-bold text-purple-400">{dayData.productive.total.toFixed(1)}h</div>
                <div className="text-sm text-gray-400">Productive</div>
              </div>
            </div>
          </Card>

          {/* Goals */}
          {dayData.goals.length > 0 && (
            <Card>
              <h3 className="text-xl font-semibold mb-4">🎯 Goals</h3>
              <div className="space-y-2">
                {dayData.goals.map(goal => (
                  <div key={goal.id} className={`flex items-center gap-3 p-3 rounded-lg ${
                    goal.done ? 'bg-emerald-900/20 text-emerald-100' : 'bg-gray-800'
                  }`}>
                    <span className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${
                      goal.done ? 'bg-emerald-500 border-emerald-500' : 'border-gray-500'
                    }`}>
                      {goal.done && <span className="text-white text-xs">✓</span>}
                    </span>
                    <span className={goal.done ? 'line-through' : ''}>{goal.text}</span>
                  </div>
                ))}
              </div>
            </Card>
          )}

          {/* Study Hours */}
          {totalStudyHours > 0 && (
            <Card>
              <h3 className="text-xl font-semibold mb-4">📚 Study Hours</h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {Object.entries(dayData.studyHours)
                  .filter(([_, hours]) => hours > 0)
                  .map(([subject, hours]) => (
                    <div key={subject} className="flex justify-between items-center p-3 bg-gray-800 rounded-lg">
                      <span>{subject}</span>
                      <span className="font-bold text-emerald-400">{hours}h</span>
                    </div>
                  ))}
              </div>
            </Card>
          )}

          {/* Expenses */}
          {dayData.expenses.length > 0 && (
            <Card>
              <h3 className="text-xl font-semibold mb-4">💰 Expenses</h3>
              <div className="space-y-2">
                {dayData.expenses.map(expense => (
                  <div key={expense.id} className="flex items-center justify-between p-3 bg-gray-800 rounded-lg">
                    <div>
                      <div className="flex items-center gap-2">
                        <span className="font-medium">€{expense.amount.toFixed(2)}</span>
                        <span className="text-xs bg-gray-700 px-2 py-1 rounded">{expense.category}</span>
                        <span className="text-xs text-gray-400">{expense.time}</span>
                      </div>
                      {expense.note && <p className="text-sm text-gray-400 mt-1">{expense.note}</p>}
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          )}

          {/* Other Activities */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {/* Gym */}
            <Card>
              <h3 className="text-xl font-semibold mb-4">💪 Gym</h3>
              {dayData.gym.done ? (
                <div className="space-y-2">
                  <div className="flex items-center gap-2 text-emerald-400">
                    <span className="text-lg">✓</span>
                    <span>Went to gym</span>
                  </div>
                  {dayData.gym.type && (
                    <p className="text-gray-300">Workout: {dayData.gym.type}</p>
                  )}
                  {dayData.gym.duration > 0 && (
                    <p className="text-gray-300">Duration: {dayData.gym.duration} minutes</p>
                  )}
                </div>
              ) : (
                <p className="text-gray-400">No gym session recorded</p>
              )}
            </Card>

            {/* Job Applications */}
            <Card>
              <h3 className="text-xl font-semibold mb-4">💼 Job Applications</h3>
              {dayData.jobs.count > 0 ? (
                <div className="space-y-2">
                  <div className="text-2xl font-bold text-purple-400">
                    {dayData.jobs.count} applications sent
                  </div>
                  {dayData.jobs.companies && (
                    <div>
                      <p className="text-sm text-gray-400 mb-1">Companies:</p>
                      <p className="text-gray-300">{dayData.jobs.companies}</p>
                    </div>
                  )}
                </div>
              ) : (
                <p className="text-gray-400">No job applications sent</p>
              )}
            </Card>
          </div>
        </div>
      );
    };

    // Main App
    const App = () => {
      const [data, updateData] = useData();
      const [activeTab, setActiveTab] = useState('today');

      const tabs = [
        { id: 'today', name: 'Today', icon: '📅' },
        { id: 'plan', name: 'Plan', icon: '🎯' },
        { id: 'weekly', name: 'Weekly', icon: '📊' },
        { id: 'history', name: 'History', icon: '📚' }
      ];

      const renderActiveTab = () => {
        switch (activeTab) {
          case 'today':
            return <TodayTab data={data} updateData={updateData} />;
          case 'plan':
            return <PlanTab data={data} updateData={updateData} />;
          case 'weekly':
            return <WeeklyTab data={data} updateData={updateData} />;
          case 'history':
            return <HistoryTab data={data} />;
          default:
            return null;
        }
      };

      return (
        <div className="min-h-screen bg-gray-950">
          {/* Header */}
          <header className="sticky top-0 z-50 bg-gray-900/95 backdrop-blur-sm border-b border-gray-800">
            <div className="max-w-6xl mx-auto px-4">
              <div className="flex items-center justify-between h-16">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 bg-gradient-to-br from-electric to-emerald-400 rounded-lg flex items-center justify-center">
                    <span className="text-gray-900 font-bold text-sm">RWU</span>
                  </div>
                  <h1 className="text-xl font-bold">Daily Dashboard</h1>
                </div>
                
                <nav className="flex items-center gap-1">
                  {tabs.map(tab => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${
                        activeTab === tab.id
                          ? 'bg-electric text-gray-900'
                          : 'text-gray-400 hover:text-gray-100 hover:bg-gray-800'
                      }`}
                    >
                      <span>{tab.icon}</span>
                      <span className="hidden sm:inline">{tab.name}</span>
                    </button>
                  ))}
                </nav>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-6xl mx-auto px-4 py-8">
            {renderActiveTab()}
          </main>
        </div>
      );
    };

    // Initialize app
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
